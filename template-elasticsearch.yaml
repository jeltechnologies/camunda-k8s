---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: camunda-elasticsearch-data
  namespace: camunda
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: camunda-elasticsearch-master
  namespace: camunda
  labels:
    app: camunda-elasticsearch
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
  selector:
    app: camunda-elasticsearch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: camunda-elasticsearch-master
  namespace: camunda
  labels:
    app: camunda-elasticsearch
spec:
  serviceName: camunda-elasticsearch-master
  replicas: 1
  selector:
    matchLabels:
      app: camunda-elasticsearch
  template:
    metadata:
      labels:
        app: camunda-elasticsearch
    spec:
      initContainers:
        - name: set-vm-max-map-count
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION}
          ports:
            - containerPort: 9200
            - containerPort: 9300
          env:
            - name: discovery.type
              value: "single-node"
            - name: ES_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
            - name: xpack.security.enabled
              value: "false"
          resources:
            requests:
              cpu: "100m"
              memory: "1Gi"
            limits:
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: camunda-elasticsearch-data
